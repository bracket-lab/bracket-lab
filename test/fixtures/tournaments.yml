# Since Tournament is a singleton, we only need one fixture for the initial state
tournament:
  state: pre_selection
  game_decisions: 0
  game_mask: 0

pre_selection:
  state: pre_selection
  game_decisions: 0
  game_mask: 0

not_started:
  state: not_started
  game_decisions: 0
  game_mask: 0

in_progress:
  state: in_progress
  game_decisions: 0
  game_mask: 0

completed:
  state: completed
  game_decisions: 0
  game_mask: <%= (2**63 - 1) %>

with_some_games:
  state: in_progress
  game_decisions: 42  # Some arbitrary decisions
  game_mask: 255     # First 8 games played
