<% CSV.read(Rails.root.join('data/teams.csv').to_s).map.with_index do |row, i|
  name = row.first
  starting_slot = i + 64
  seed = Team.seed_for_slot(starting_slot)
  region = i / 16
%>
  team_<%= starting_slot %>:
    starting_slot: <%= starting_slot %>
    name: <%= name %>
    seed: <%= seed %>
    region: <%= region %>
<% end %>
